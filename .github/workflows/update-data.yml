name: Daily Stock Data Sync (Backend)

on:
  schedule:
    - cron: '0 14,16,18,20 * * 1-5' # A las 11:00, 13:00, 15:00 y 17:00 AR, de lunes a viernes
  workflow_dispatch: # Permite correrlo manualmente desde la pestaña "Actions"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Extraer código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: ./scripts
        run: npm install

      - name: Descargar API y Actualizar Nube
        working-directory: ./scripts
        env:
          API_KEY: ${{ secrets.API_KEY }} 
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node update-data.js
